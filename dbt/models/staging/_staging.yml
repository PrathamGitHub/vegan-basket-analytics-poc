version: 2

models:
  - name: stg_transaction_log
    description: Typed and standardized Transaction Log rows from raw ingestion.
    columns:
      - name: transaction_timestamp
        tests:
          - not_null
      - name: transaction_date
        tests:
          - not_null
      - name: transaction_type
        tests:
          - not_null
          - accepted_values:
              values: ['Purchase', 'Sale']
      - name: payment_rs
        tests:
          - not_null

  - name: stg_vendor_rates
    description: Typed and standardized Vendor Rates rows from raw ingestion.
    columns:
      - name: effective_from
        tests:
          - not_null
      - name: vendor_name
        tests:
          - not_null

  - name: stg_customer_rates
    description: Typed and standardized Customer Rates rows from raw ingestion.
    columns:
      - name: effective_from
        tests:
          - not_null
      - name: customer_name
        tests:
          - not_null

version: 1
type: metrics_view

display_name: Vendor Summary
model: vendor_summary_data

security:
  access: true

dimensions:
  - name: vendor_name
    display_name: Vendor
    column: vendor_name

measures:
  - name: purchase_qty
    display_name: Purchase Qty (kg)
    expression: sum(purchase_qty)
    format_d3: ",.1f"

  - name: purchase_amount
    display_name: Purchase Amount (Rs)
    expression: sum(purchase_amount)
    format_d3: ",.0f"
    format_d3_locale:
      currency: ["₹", ""]

  - name: outstanding_payable
    display_name: Outstanding Payable (Rs)
    description: Lifetime accounts payable balance by vendor.
    expression: sum(outstanding_payable)
    format_d3: ",.0f"
    format_d3_locale:
      currency: ["₹", ""]

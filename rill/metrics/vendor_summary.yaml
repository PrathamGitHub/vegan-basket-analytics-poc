version: 1
type: metrics_view

display_name: Vendor Summary
model: vendor_summary_data
timeseries: date
smallest_time_grain: day

security:
  access: true

dimensions:
  - name: vendor_name
    display_name: Vendor
    column: vendor_name

measures:
  - name: purchase_qty
    display_name: Purchase Qty (kg)
    expression: sum(purchase_qty)
    format_d3: ",.1f"

  - name: purchase_amount
    display_name: Purchase Amount (₹)
    expression: sum(purchase_amount)
    format_d3: ",.0f"
    format_d3_locale:
      currency: ["₹", ""]

  - name: payments_paid
    display_name: Payments Paid (₹)
    expression: sum(payments_paid)
    format_d3: ",.0f"
    format_d3_locale:
      currency: ["₹", ""]

  - name: outstanding_payable
    display_name: Outstanding Payable (₹)
    description: >
      Cumulative accounts payable balance as of the last day in the selected
      date range (precomputed running total per vendor).
    expression: arg_max(outstanding_payable, date)
    format_d3: ",.0f"
    format_d3_locale:
      currency: ["₹", ""]
